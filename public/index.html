<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#000"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>VOID</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{width:100%;height:100%;overflow:hidden;background:#000}
    ::-webkit-scrollbar{display:none}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.45)}100%{transform:scale(1)}}
    @keyframes floatUp{0%{opacity:.9;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-90px) scale(1.5)}}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

/* ── session ── */
let SID = localStorage.getItem("void_sid");
if(!SID){
  SID = typeof crypto.randomUUID==="function"
    ? crypto.randomUUID()
    : Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,"0")).join("-");
  localStorage.setItem("void_sid",SID);
}

/* ── api helpers ── */
const apiFetch = (url,opts={}) => fetch(url,{
  ...opts,
  headers:{"x-session-id":SID,...(opts.body&&!(opts.body instanceof FormData)?{"Content-Type":"application/json"}:{}),...opts.headers}
}).then(r=>r.json());

const API = {
  videos:      ()          => apiFetch("/api/videos"),
  publish:     (fd)        => apiFetch("/api/videos",{method:"POST",body:fd}),
  vote:        (id,dir)    => apiFetch(`/api/votes/${id}`,{method:"POST",body:JSON.stringify({direction:dir})}),
  votesLeft:   ()          => apiFetch("/api/votes/status"),
  comments:    (id)        => apiFetch(`/api/videos/${id}/comments`),
  addComment:  (id,text)   => apiFetch(`/api/videos/${id}/comments`,{method:"POST",body:JSON.stringify({text})}),
};

/* ── utils ── */
const fmt = n => n>=1e6?(n/1e6).toFixed(1)+"M":n>=1000?(n/1000).toFixed(1)+"k":String(n);
const ago = ts => {
  const s=(Date.now()-new Date(ts).getTime())/1000;
  if(s<60)return "ora";if(s<3600)return Math.floor(s/60)+"m fa";
  if(s<86400)return Math.floor(s/3600)+"h fa";return Math.floor(s/86400)+"g fa";
};
const CATS = ["VITA REALE","TECH","LUOGHI","MENTE","ARTE","SPORT","MUSICA","ALTRO"];

/* ════════════════════════════════════════════════════
   COMMENTS SHEET
════════════════════════════════════════════════════ */
function CommentsSheet({videoId, onClose}){
  const [comments,setComments] = useState([]);
  const [text,setText]         = useState("");
  const [loading,setLoading]   = useState(true);
  const [sending,setSending]   = useState(false);
  const listRef = useRef();

  useEffect(()=>{
    API.comments(videoId).then(d=>{
      setComments(d.comments||[]);
      setLoading(false);
      setTimeout(()=>listRef.current?.scrollTo(0,99999),50);
    }).catch(()=>setLoading(false));
  },[videoId]);

  const submit = async()=>{
    if(!text.trim()||sending) return;
    setSending(true);
    const d = await API.addComment(videoId,text.trim()).catch(()=>null);
    if(d?.success){ setComments(c=>[...c,d.comment]); setText(""); setTimeout(()=>listRef.current?.scrollTo(0,99999),50); }
    setSending(false);
  };

  return(
    <div style={{position:"fixed",inset:0,zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
      <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.65)",backdropFilter:"blur(8px)"}}/>
      <div style={{
        position:"relative",zIndex:1,background:"#111",
        borderRadius:"18px 18px 0 0",maxHeight:"78vh",display:"flex",flexDirection:"column",
        paddingBottom:"max(env(safe-area-inset-bottom),8px)",
        animation:"slideUp .3s cubic-bezier(.32,.72,0,1)",
      }}>
        <div style={{padding:"12px 0 6px",display:"flex",justifyContent:"center"}}>
          <div style={{width:36,height:3,background:"rgba(255,255,255,.15)",borderRadius:99}}/>
        </div>
        <div style={{padding:"0 20px 12px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontFamily:"Inter,sans-serif",fontSize:14,fontWeight:600,color:"#fff"}}>
            {loading?"...":comments.length===0?"Nessun commento":comments.length===1?"1 commento":`${comments.length} commenti`}
          </span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"rgba(255,255,255,.4)",fontSize:22,cursor:"pointer",lineHeight:1}}>×</button>
        </div>

        <div ref={listRef} style={{flex:1,overflowY:"auto",padding:"14px 20px",display:"flex",flexDirection:"column",gap:18}}>
          {loading
            ? <div style={{display:"flex",justifyContent:"center",padding:"30px 0"}}><div style={{width:20,height:20,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .7s linear infinite"}}/></div>
            : comments.length===0
              ? <p style={{fontFamily:"Inter,sans-serif",fontSize:13,color:"rgba(255,255,255,.3)",textAlign:"center",padding:"30px 0"}}>Sii il primo a commentare</p>
              : comments.map(c=>(
                <div key={c.id} style={{display:"flex",gap:10}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.08)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"rgba(255,255,255,.4)"}}>
                      {c.ghost_id}
                    </span>
                  </div>
                  <div style={{flex:1}}>
                    <p style={{fontFamily:"Inter,sans-serif",fontSize:13,color:"rgba(255,255,255,.88)",lineHeight:1.5}}>{c.text}</p>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"rgba(255,255,255,.25)"}}>{ago(c.created_at)}</span>
                  </div>
                </div>
              ))
          }
        </div>

        <div style={{padding:"10px 14px",borderTop:"1px solid rgba(255,255,255,.06)",display:"flex",gap:8,alignItems:"center"}}>
          <input
            value={text} onChange={e=>setText(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&submit()}
            placeholder="Scrivi un commento anonimo..."
            maxLength={500}
            style={{flex:1,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:24,padding:"10px 16px",fontFamily:"Inter,sans-serif",fontSize:13,color:"#fff",outline:"none"}}
          />
          <button onClick={submit} disabled={!text.trim()||sending} style={{
            width:40,height:40,borderRadius:"50%",border:"none",cursor:"pointer",
            background:text.trim()?"#fff":"rgba(255,255,255,.1)",
            color:text.trim()?"#000":"rgba(255,255,255,.3)",
            fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",
            transition:"all .2s",
          }}>↑</button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════
   UPLOAD SHEET
════════════════════════════════════════════════════ */
function UploadSheet({onClose,onUploaded}){
  const [desc,setDesc]   = useState("");
  const [tags,setTags]   = useState("");
  const [cat,setCat]     = useState("VITA REALE");
  const [file,setFile]   = useState(null);
  const [preview,setPreview] = useState(null);
  const [state,setState] = useState("idle");
  const [err,setErr]     = useState("");
  const fileRef = useRef();

  const pickFile = e => {
    const f = e.target.files[0]; if(!f) return;
    setFile(f);
    setPreview(URL.createObjectURL(f));
  };

  const submit = async()=>{
    if(!desc.trim()){setErr("Aggiungi una descrizione");return;}
    setState("uploading");setErr("");
    try{
      const fd = new FormData();
      fd.append("description",desc.trim());
      fd.append("tags",tags);
      fd.append("category",cat);
      if(file) fd.append("video",file);
      const d = await fetch("/api/videos",{method:"POST",headers:{"x-session-id":SID},body:fd}).then(r=>r.json());
      if(d.success){setState("done");setTimeout(()=>{onUploaded(d.video);onClose();},1400);}
      else{setErr(d.error||"Errore");setState("idle");}
    }catch(e){setErr("Errore di rete");setState("idle");}
  };

  const ipt = {background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,color:"#fff",padding:"12px 14px",fontFamily:"Inter,sans-serif",fontSize:14,width:"100%",outline:"none"};

  return(
    <div style={{position:"fixed",inset:0,zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
      <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,.75)",backdropFilter:"blur(10px)"}}/>
      <div onClick={e=>e.stopPropagation()} style={{
        position:"relative",zIndex:1,background:"#0f0f0f",
        borderRadius:"18px 18px 0 0",padding:"0 20px",
        paddingBottom:"max(env(safe-area-inset-bottom),24px)",
        animation:"slideUp .3s cubic-bezier(.32,.72,0,1)",
        maxHeight:"92vh",overflowY:"auto",
      }}>
        <div style={{padding:"14px 0 8px",display:"flex",justifyContent:"center"}}>
          <div style={{width:36,height:3,background:"rgba(255,255,255,.15)",borderRadius:99}}/>
        </div>

        {state==="done"?(
          <div style={{textAlign:"center",padding:"44px 0"}}>
            <div style={{fontSize:46,marginBottom:14}}>✓</div>
            <p style={{fontFamily:"Inter,sans-serif",fontSize:15,color:"rgba(255,255,255,.7)"}}>Pubblicato nel Void</p>
            <p style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"rgba(255,255,255,.3)",marginTop:6,letterSpacing:"0.1em"}}>ANONIMO</p>
          </div>
        ):state==="uploading"?(
          <div style={{textAlign:"center",padding:"44px 0"}}>
            <div style={{width:28,height:28,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",margin:"0 auto 16px",animation:"spin .8s linear infinite"}}/>
            <p style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"rgba(255,255,255,.4)",letterSpacing:"0.1em"}}>CARICAMENTO...</p>
          </div>
        ):(
          <>
            <h2 style={{fontFamily:"Inter,sans-serif",fontSize:17,fontWeight:600,color:"#fff",marginBottom:20,paddingTop:6}}>Pubblica nel Void</h2>

            {/* video picker */}
            <div onClick={()=>fileRef.current.click()} style={{
              border:`1.5px dashed ${file?"rgba(255,255,255,.4)":"rgba(255,255,255,.12)"}`,
              borderRadius:12,overflow:"hidden",
              height:180,cursor:"pointer",marginBottom:14,
              background:"rgba(255,255,255,.02)",
              display:"flex",alignItems:"center",justifyContent:"center",
              position:"relative",
            }}>
              {preview?(
                <video src={preview} style={{width:"100%",height:"100%",objectFit:"cover"}} muted/>
              ):(
                <div style={{textAlign:"center",opacity:.35}}>
                  <div style={{fontSize:32,marginBottom:8}}>🎬</div>
                  <span style={{fontFamily:"Inter,sans-serif",fontSize:13,color:"#fff"}}>Scegli un video</span>
                </div>
              )}
              <input ref={fileRef} type="file" accept="video/*" style={{display:"none"}} onChange={pickFile}/>
            </div>

            <textarea
              placeholder="Descrivi il video... nessuno saprà chi sei"
              value={desc} onChange={e=>setDesc(e.target.value)} maxLength={220} rows={3}
              style={{...ipt,resize:"none",marginBottom:10,lineHeight:1.55}}
            />
            <input
              placeholder="Tag: separati da virgola (es. cibo, italia, ricetta)"
              value={tags} onChange={e=>setTags(e.target.value)}
              style={{...ipt,marginBottom:10}}
            />
            <select value={cat} onChange={e=>setCat(e.target.value)} style={{...ipt,marginBottom:16,cursor:"pointer"}}>
              {CATS.map(c=><option key={c}>{c}</option>)}
            </select>

            {err&&<p style={{fontFamily:"Inter,sans-serif",fontSize:12,color:"#ff5555",marginBottom:10}}>{err}</p>}

            <button onClick={submit} style={{
              width:"100%",height:52,borderRadius:12,
              background:"#fff",color:"#000",border:"none",
              fontFamily:"Inter,sans-serif",fontSize:15,fontWeight:600,
              cursor:"pointer",marginBottom:8,
            }}>Pubblica</button>

            <p style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"rgba(255,255,255,.25)",textAlign:"center",marginBottom:8,letterSpacing:"0.08em"}}>
              Il tuo Ghost ID viene generato casualmente. Nessuno sa chi sei.
            </p>
          </>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════
   VIDEO CARD
════════════════════════════════════════════════════ */
function VideoCard({video, rank, myVote, votesLeft, onVote, onOpenComments, isActive}){
  const [showInfo,setShowInfo]  = useState(true);
  const [up,setUp]               = useState(Number(video.upvotes)||0);
  const [dn,setDn]               = useState(Number(video.downvotes)||0);
  const [commentCount,setCC]     = useState(Number(video.comment_count)||0);
  const [popUp,setPopUp]         = useState(false);
  const [popDn,setPopDn]         = useState(false);
  const [floats,setFloats]       = useState([]);
  const videoRef = useRef();

  // live vote updates from socket
  useEffect(()=>{ setUp(Number(video.upvotes)||0); setDn(Number(video.downvotes)||0); },[video.upvotes,video.downvotes]);

  // play/pause on scroll
  useEffect(()=>{
    const v = videoRef.current; if(!v) return;
    if(isActive){ v.play().catch(()=>{}); }
    else{ v.pause(); v.currentTime=0; }
  },[isActive]);

  const vote = async dir => {
    if(myVote||votesLeft<=0) return;
    if(dir==="up"){
      setUp(v=>v+1); setPopUp(true); setTimeout(()=>setPopUp(false),400);
      const id=Date.now();
      setFloats(f=>[...f,{id,x:Math.random()*50+25}]);
      setTimeout(()=>setFloats(f=>f.filter(x=>x.id!==id)),1100);
    } else {
      setDn(v=>v+1); setPopDn(true); setTimeout(()=>setPopDn(false),400);
    }
    onVote(video.id, dir);
  };

  const total = (up+dn)||1;
  const pct   = Math.round(up/total*100);
  const score = up-dn;

  return(
    <div style={{position:"relative",width:"100%",height:"100%",background:"#0a0a0a",overflow:"hidden"}}
      onClick={()=>setShowInfo(v=>!v)}>

      {/* video or dark bg */}
      {video.url?(
        <video ref={videoRef} src={video.url}
          style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}
          loop playsInline muted/>
      ):(
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"rgba(255,255,255,.12)",letterSpacing:"0.15em"}}>NESSUN VIDEO</span>
        </div>
      )}

      {/* gradient top */}
      <div style={{position:"absolute",top:0,left:0,right:0,height:130,background:"linear-gradient(to bottom,rgba(0,0,0,.6) 0%,transparent 100%)",pointerEvents:"none",zIndex:2}}/>
      {/* gradient bottom */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:300,background:"linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.4) 55%,transparent 100%)",pointerEvents:"none",zIndex:2}}/>

      {/* header */}
      <div style={{position:"absolute",top:0,left:0,right:0,padding:"max(env(safe-area-inset-top),14px) 18px 0",display:"flex",justifyContent:"space-between",alignItems:"center",zIndex:10}}>
        <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:26,letterSpacing:"0.16em",color:"#fff"}}>VOID</span>
        <div style={{display:"flex",gap:0}}>
          {["Top","Nuovi"].map((t,i)=>(
            <span key={t} style={{fontSize:12,fontFamily:"Inter,sans-serif",fontWeight:i===0?600:400,color:i===0?"#fff":"rgba(255,255,255,.35)",padding:"4px 10px",borderBottom:i===0?"1.5px solid #fff":"1.5px solid transparent",cursor:"pointer"}}>{t}</span>
          ))}
        </div>
      </div>

      {/* rank */}
      <div style={{position:"absolute",top:60,left:16,zIndex:3,pointerEvents:"none"}}>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"rgba(255,255,255,.3)",letterSpacing:"0.1em"}}>#{rank}</span>
      </div>

      {/* right actions */}
      <div style={{
        position:"absolute",right:12,
        bottom:"calc(max(env(safe-area-inset-bottom),0px) + 76px)",
        display:"flex",flexDirection:"column",alignItems:"center",gap:22,zIndex:10,
      }} onClick={e=>e.stopPropagation()}>

        {/* floating △ */}
        {floats.map(h=>(
          <div key={h.id} style={{position:"absolute",left:`${h.x}%`,bottom:0,fontSize:16,color:"#fff",animation:"floatUp 1.1s ease-out forwards",pointerEvents:"none"}}>△</div>
        ))}

        {/* up */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
          <button onClick={()=>vote("up")} style={{
            width:46,height:46,borderRadius:"50%",
            background:myVote==="up"?"rgba(255,255,255,.2)":"rgba(255,255,255,.08)",
            border:myVote==="up"?"1.5px solid rgba(255,255,255,.9)":"1.5px solid rgba(255,255,255,.15)",
            backdropFilter:"blur(10px)",
            color:"#fff",fontSize:17,cursor:myVote||votesLeft<=0?"default":"pointer",
            transform:popUp?"scale(1.4)":"scale(1)",
            transition:"transform .3s cubic-bezier(.34,1.56,.64,1),background .2s",
            display:"flex",alignItems:"center",justifyContent:"center",
          }}>△</button>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#fff",fontWeight:500}}>{fmt(up)}</span>
        </div>

        {/* down */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
          <button onClick={()=>vote("down")} style={{
            width:46,height:46,borderRadius:"50%",
            background:myVote==="down"?"rgba(255,70,70,.25)":"rgba(255,255,255,.08)",
            border:myVote==="down"?"1.5px solid rgba(255,80,80,.9)":"1.5px solid rgba(255,255,255,.15)",
            backdropFilter:"blur(10px)",
            color:myVote==="down"?"#ff6b6b":"#fff",fontSize:17,cursor:myVote||votesLeft<=0?"default":"pointer",
            transform:popDn?"scale(1.4)":"scale(1)",
            transition:"transform .3s cubic-bezier(.34,1.56,.64,1),background .2s",
            display:"flex",alignItems:"center",justifyContent:"center",
          }}>▽</button>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#fff"}}>{fmt(dn)}</span>
        </div>

        {/* comments */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
          <button onClick={onOpenComments} style={{
            width:46,height:46,borderRadius:"50%",
            background:"rgba(255,255,255,.08)",border:"1.5px solid rgba(255,255,255,.15)",
            backdropFilter:"blur(10px)",color:"#fff",fontSize:19,cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",
          }}>💬</button>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#fff"}}>{fmt(commentCount)}</span>
        </div>

        {/* share */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
          <button onClick={()=>navigator.share?.({title:"VOID",url:location.href}).catch(()=>{})} style={{
            width:46,height:46,borderRadius:"50%",
            background:"rgba(255,255,255,.08)",border:"1.5px solid rgba(255,255,255,.15)",
            backdropFilter:"blur(10px)",color:"#fff",fontSize:18,cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",
          }}>↑</button>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#fff"}}>Share</span>
        </div>
      </div>

      {/* bottom info overlay */}
      <div style={{
        position:"absolute",bottom:0,left:0,right:"70px",
        padding:"0 16px",
        paddingBottom:"calc(max(env(safe-area-inset-bottom),0px) + 74px)",
        zIndex:10,
        opacity:showInfo?1:0,
        transform:showInfo?"translateY(0)":"translateY(8px)",
        transition:"opacity .22s, transform .22s",
        pointerEvents:showInfo?"auto":"none",
      }}>
        {/* ghost + meta */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"rgba(255,255,255,.55)",letterSpacing:"0.08em"}}>{video.ghost_id}</span>
          <span style={{width:3,height:3,borderRadius:"50%",background:"rgba(255,255,255,.2)",display:"inline-block"}}/>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"rgba(255,255,255,.35)",letterSpacing:"0.08em"}}>{video.category}</span>
          <span style={{width:3,height:3,borderRadius:"50%",background:"rgba(255,255,255,.2)",display:"inline-block"}}/>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"rgba(255,255,255,.3)"}}>{ago(video.created_at)}</span>
        </div>

        {/* description */}
        <p style={{fontFamily:"Inter,sans-serif",fontSize:14,lineHeight:1.55,color:"rgba(255,255,255,.9)",marginBottom:8,fontWeight:400}}>
          {video.description}
        </p>

        {/* tags */}
        {(video.tags||[]).length>0&&(
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
            {video.tags.map(t=>(
              <span key={t} style={{fontFamily:"Inter,sans-serif",fontSize:11,color:"rgba(255,255,255,.38)"}}>#{t}</span>
            ))}
          </div>
        )}

        {/* vote bar */}
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1,height:2,background:"rgba(255,255,255,.1)",borderRadius:99,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:"rgba(255,255,255,.7)",borderRadius:99,transition:"width .8s cubic-bezier(.22,1,.36,1)"}}/>
          </div>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"rgba(255,255,255,.4)",flexShrink:0}}>{pct}%</span>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:score>=0?"rgba(255,255,255,.55)":"rgba(255,90,90,.8)",flexShrink:0}}>
            {score>0?"+":""}{fmt(score)}
          </span>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════
   EMPTY STATE
════════════════════════════════════════════════════ */
function EmptyFeed({onUpload}){
  return(
    <div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:"0 40px",textAlign:"center"}}>
      <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:28,letterSpacing:"0.16em",color:"rgba(255,255,255,.12)"}}>VOID</span>
      <p style={{fontFamily:"Inter,sans-serif",fontSize:15,color:"rgba(255,255,255,.35)",lineHeight:1.6}}>
        Nessun video ancora.<br/>Sii il primo a pubblicare.
      </p>
      <button onClick={onUpload} style={{
        marginTop:8,padding:"12px 28px",borderRadius:10,
        background:"#fff",color:"#000",border:"none",
        fontFamily:"Inter,sans-serif",fontSize:14,fontWeight:600,cursor:"pointer",
      }}>Pubblica ora</button>
    </div>
  );
}

/* ════════════════════════════════════════════════════
   APP
════════════════════════════════════════════════════ */
function App(){
  const [videos,setVideos]       = useState([]);
  const [idx,setIdx]             = useState(0);
  const [loading,setLoading]     = useState(true);
  const [moving,setMoving]       = useState(false);
  const [votedMap,setVotedMap]   = useState(new Map());
  const [votesLeft,setVotesLeft] = useState(10);
  const [commentVideoId,setCommentVideoId] = useState(null);
  const [showUpload,setShowUpload] = useState(false);
  const [toast,setToast]         = useState(null);
  const [dragStart,setDragStart] = useState(null);
  const [tab,setTab]             = useState("home");
  const wrapRef = useRef();

  /* load */
  useEffect(()=>{
    Promise.all([API.videos(), API.votesLeft()]).then(([vd,vl])=>{
      setVideos(vd.videos||[]);
      setVotesLeft(vl.votesLeft??10);
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);

  /* socket */
  useEffect(()=>{
    try{
      const sock=io();
      sock.on("voteUpdate",({videoId,upvotes,downvotes})=>{
        setVideos(vs=>vs.map(v=>v.id===videoId?{...v,upvotes,downvotes}:v));
      });
      sock.on("newVideo",v=>{
        setVideos(vs=>[v,...vs].sort((a,b)=>(Number(b.upvotes)-Number(b.downvotes))-(Number(a.upvotes)-Number(a.downvotes))));
      });
      sock.on("newComment",({videoId})=>{
        setVideos(vs=>vs.map(v=>v.id===videoId?{...v,comment_count:(Number(v.comment_count)||0)+1}:v));
      });
      return()=>sock.disconnect();
    }catch(e){}
  },[]);

  const toast_ = (msg,ms=2200)=>{ setToast(msg); setTimeout(()=>setToast(null),ms); };

  const goTo = useCallback(dir=>{
    if(moving) return;
    const next=idx+dir;
    if(next<0||next>=videos.length) return;
    setMoving(true); setIdx(next); setTimeout(()=>setMoving(false),430);
  },[idx,moving,videos.length]);

  /* wheel */
  useEffect(()=>{
    const el=wrapRef.current; if(!el) return;
    let last=0;
    const fn=e=>{ e.preventDefault(); const now=Date.now(); if(now-last<360)return; if(Math.abs(e.deltaY)>15){last=now;goTo(e.deltaY>0?1:-1);} };
    el.addEventListener("wheel",fn,{passive:false});
    return()=>el.removeEventListener("wheel",fn);
  },[goTo]);

  /* touch */
  const onTS = e=>setDragStart(e.touches[0].clientY);
  const onTE = e=>{ if(dragStart===null)return; const d=dragStart-e.changedTouches[0].clientY; if(Math.abs(d)>40)goTo(d>0?1:-1); setDragStart(null); };

  /* keyboard */
  useEffect(()=>{
    const fn=e=>{ if(e.key==="ArrowDown")goTo(1); if(e.key==="ArrowUp")goTo(-1); };
    window.addEventListener("keydown",fn); return()=>window.removeEventListener("keydown",fn);
  },[goTo]);

  const handleVote = async(videoId,dir)=>{
    if(votesLeft<=0){toast_("Hai esaurito i voti di oggi");return;}
    const m=new Map(votedMap); m.set(videoId,dir); setVotedMap(m); setVotesLeft(v=>v-1);
    const r=await API.vote(videoId,dir).catch(()=>({success:false}));
    if(!r.success){ const rv=new Map(votedMap); setVotedMap(rv); setVotesLeft(v=>v+1); toast_(r.error||"Errore"); }
  };

  if(loading) return(
    <div style={{width:"100vw",height:"100dvh",background:"#000",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:22,height:22,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
      <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,letterSpacing:"0.18em",color:"rgba(255,255,255,.3)"}}>VOID</span>
    </div>
  );

  const isPhone = window.innerWidth<=420;

  return(
    <div style={{width:"100vw",height:"100dvh",background:"#000",display:"flex",alignItems:"center",justifyContent:"center"}}>

      <div ref={wrapRef} onTouchStart={onTS} onTouchEnd={onTE} style={{
        width:"min(390px,100vw)", height:"min(844px,100dvh)",
        position:"relative",overflow:"hidden",background:"#000",
        borderRadius:isPhone?0:36,
        boxShadow:isPhone?"none":"0 40px 100px rgba(0,0,0,.95),0 0 0 1px rgba(255,255,255,.05)",
      }}>

        {/* feed */}
        <div style={{width:"100%",height:"calc(100% - 58px)",overflow:"hidden"}}>
          {videos.length===0?(
            <EmptyFeed onUpload={()=>setShowUpload(true)}/>
          ):(
            <div style={{
              display:"flex",flexDirection:"column",
              transform:`translateY(-${idx*100}%)`,
              transition:moving?"transform .42s cubic-bezier(.32,.72,0,1)":"none",
              height:`${videos.length*100}%`,
            }}>
              {videos.map((v,i)=>(
                <div key={v.id} style={{height:`${100/videos.length}%`,flexShrink:0}}>
                  <VideoCard
                    video={v} rank={i+1}
                    myVote={votedMap.get(v.id)}
                    votesLeft={votesLeft}
                    onVote={handleVote}
                    onOpenComments={()=>setCommentVideoId(v.id)}
                    isActive={i===idx}
                  />
                </div>
              ))}
            </div>
          )}
        </div>

        {/* progress pills */}
        {videos.length>1&&(
          <div style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",display:"flex",flexDirection:"column",gap:4,zIndex:20,pointerEvents:"none"}}>
            {videos.map((_,i)=>(
              <div key={i} style={{width:2,height:i===idx?22:4,borderRadius:99,background:i===idx?"rgba(255,255,255,.8)":"rgba(255,255,255,.18)",transition:"all .3s"}}/>
            ))}
          </div>
        )}

        {/* bottom nav */}
        <div style={{
          position:"absolute",bottom:0,left:0,right:0,height:58,
          background:"rgba(0,0,0,.96)",backdropFilter:"blur(24px)",
          borderTop:"1px solid rgba(255,255,255,.05)",
          display:"flex",alignItems:"center",justifyContent:"space-around",
          paddingBottom:"max(env(safe-area-inset-bottom),0px)",
          zIndex:30,
        }}>
          {[
            {id:"home",  icon:"⊞", label:"Home"},
            {id:"search",icon:"◎", label:"Esplora"},
            {id:"add",   icon:null,label:""},
            {id:"notif", icon:"◇", label:"Notifiche"},
            {id:"profile",icon:"○",label:"Profilo"},
          ].map((item,i)=>
            item.id==="add"?(
              <button key="add" onClick={()=>setShowUpload(true)} style={{
                width:44,height:28,borderRadius:7,background:"#fff",border:"none",
                fontSize:22,color:"#000",fontWeight:300,cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",
              }}>+</button>
            ):(
              <button key={item.id} onClick={()=>setTab(item.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 10px"}}>
                <span style={{fontSize:17,color:tab===item.id?"#fff":"rgba(255,255,255,.28)"}}>{item.icon}</span>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:tab===item.id?"#fff":"rgba(255,255,255,.22)",letterSpacing:"0.08em"}}>{item.label}</span>
              </button>
            )
          )}
        </div>

        {/* votes dots */}
        <div style={{position:"absolute",bottom:66,left:16,zIndex:20,display:"flex",gap:4}}>
          {[...Array(10)].map((_,i)=>(
            <div key={i} style={{width:4,height:4,borderRadius:"50%",background:i<votesLeft?"rgba(255,255,255,.65)":"rgba(255,255,255,.1)",transition:"background .3s"}}/>
          ))}
        </div>

        {/* toast */}
        {toast&&(
          <div style={{position:"absolute",bottom:76,left:"50%",transform:"translateX(-50%)",background:"rgba(18,18,18,.97)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,padding:"10px 18px",zIndex:50,whiteSpace:"nowrap",animation:"fadeUp .2s ease-out"}}>
            <span style={{fontFamily:"Inter,sans-serif",fontSize:13,color:"rgba(255,255,255,.8)"}}>{toast}</span>
          </div>
        )}
      </div>

      {/* sheets */}
      {commentVideoId&&(
        <CommentsSheet videoId={commentVideoId} onClose={()=>setCommentVideoId(null)}/>
      )}
      {showUpload&&(
        <UploadSheet
          onClose={()=>setShowUpload(false)}
          onUploaded={v=>{ setVideos(vs=>[v,...vs]); toast_("Pubblicato nel void"); }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
